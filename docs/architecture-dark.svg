<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/>
    </marker>
  </defs>

  <!-- Discord -->
  <rect x="40" y="40" width="160" height="60" rx="8" fill="none" stroke="#e6edf3" stroke-width="1.5"/>
  <text x="120" y="76" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">Discord</text>

  <!-- Cloudflare Worker -->
  <rect x="320" y="40" width="240" height="60" rx="8" fill="none" stroke="#e6edf3" stroke-width="1.5"/>
  <text x="440" y="65" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">Cloudflare Worker</text>
  <text x="440" y="85" text-anchor="middle" fill="#8b949e" font-size="12">(the Discord bot)</text>

  <!-- Discord ↔ Worker (double arrow) -->
  <line x1="200" y1="70" x2="320" y2="70" stroke="#8b949e" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="260" y="58" text-anchor="middle" fill="#8b949e" font-size="12">/&lt;game&gt; start</text>
  <text x="260" y="92" text-anchor="middle" fill="#8b949e" font-size="12">live message edits</text>

  <!-- Worker → VM (create) -->
  <line x1="440" y1="100" x2="440" y2="198" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="452" y="135" fill="#8b949e" font-size="12">Hetzner Cloud API</text>
  <text x="452" y="152" fill="#8b949e" font-size="12">(create &amp; delete VM)</text>

  <!-- Hetzner VM (outer box) -->
  <rect x="320" y="200" width="240" height="210" rx="8" fill="none" stroke="#e6edf3" stroke-width="1.5"/>
  <text x="440" y="222" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">Hetzner VM</text>
  <text x="440" y="240" text-anchor="middle" fill="#8b949e" font-size="12">(booted from snapshot in ~75 s)</text>

  <!-- Docker container (nested) -->
  <rect x="340" y="255" width="200" height="55" rx="4" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <text x="440" y="276" text-anchor="middle" fill="#e6edf3" font-size="13">Docker container</text>
  <text x="440" y="294" text-anchor="middle" fill="#8b949e" font-size="11">(game server)</text>

  <!-- Watchdog (nested) -->
  <rect x="340" y="325" width="200" height="70" rx="4" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <text x="440" y="345" text-anchor="middle" fill="#e6edf3" font-size="13">Watchdog</text>
  <text x="440" y="362" text-anchor="middle" fill="#8b949e" font-size="11">A2S query every 60 s</text>
  <text x="440" y="377" text-anchor="middle" fill="#8b949e" font-size="11">→ /api/cleanup when idle 60 m</text>

  <!-- VM → Volume -->
  <line x1="440" y1="410" x2="440" y2="458" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="452" y="438" fill="#8b949e" font-size="12">attached on create</text>

  <!-- Persistent volume (dashed to indicate independent lifecycle) -->
  <rect x="320" y="460" width="240" height="80" rx="8" fill="none" stroke="#e6edf3" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="440" y="486" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">Persistent block volume</text>
  <text x="440" y="504" text-anchor="middle" fill="#8b949e" font-size="12">(world saves)</text>
  <text x="440" y="520" text-anchor="middle" fill="#8b949e" font-size="12">survives the VM lifecycle</text>
</svg>
